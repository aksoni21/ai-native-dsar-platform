<!doctype html>
<html><head><meta charset="utf-8"/><title>Flow Dark</title>
<style>
  body { margin:0; padding:40px; background:#060912; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif; }
  .flow { display:inline-flex; align-items:stretch; padding:32px 36px; border-radius:16px; background:#0f1626; border:1px solid #1e293b; }
  .step { display:flex; flex-direction:column; align-items:center; gap:10px; min-width:96px; }
  .badge { width:48px; height:48px; border-radius:999px; background:#1e293b; color:#94a3b8; display:inline-flex; align-items:center; justify-content:center; border:1.5px solid #334155; }
  .badge svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .label { font-size:11px; font-weight:500; color:#94a3b8; text-align:center; max-width:96px; line-height:1.3; }
  .step.hi .badge { background:#2563eb; color:#fff; border-color:#2563eb; box-shadow:0 4px 14px rgba(37,99,235,0.55); }
  .step.hi .label { color:#60a5fa; font-weight:600; }
  .arrow { align-self:center; flex-shrink:0; height:1.5px; width:20px; background:#475569; margin:0 4px; position:relative; }
  .arrow::after { content:''; position:absolute; right:-3px; top:-2.75px; width:0; height:0; border-left:5px solid #475569; border-top:3px solid transparent; border-bottom:3px solid transparent; }
</style></head>
