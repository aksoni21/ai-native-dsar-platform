<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Instrata Pipeline Stages — Export</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        padding: 48px 56px;
      }
      body.dark {
        background: #060912;
        color: #e2e8f0;
      }

      h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #64748b;
        margin: 48px 0 16px;
        font-weight: 600;
      }
      body.dark h2 { color: #94a3b8; }

      /* Vertical rail */
      .rail-card {
        display: inline-flex;
        flex-direction: column;
        gap: 10px;
        padding: 20px 18px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.06);
        min-width: 220px;
      }
      body.dark .rail-card {
        background: #0f1626;
        box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 12px rgba(0,0,0,0.45);
      }

      .rail-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #94a3b8;
        font-weight: 600;
        padding: 0 4px 6px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.15);
        margin-bottom: 4px;
      }

      .stage-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 13px;
        color: #475569;
      }
      body.dark .stage-row { color: #94a3b8; }

      .stage-row.active {
        background: #2563eb;
        color: #ffffff;
        font-weight: 500;
      }

      .stage-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .stage-icon svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .stage-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex-shrink: 0;
      }
      .stage-dot.completed { background: #22c55e; }
      .stage-dot.always { background: #22c55e; }
      .stage-dot.active-dot { background: rgba(255, 255, 255, 0.85); }

      /* Horizontal flow */
      .flow {
        display: inline-flex;
        align-items: stretch;
        gap: 0;
        padding: 24px 28px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 8px rgba(15, 23, 42, 0.06);
      }
      body.dark .flow {
        background: #0f1626;
        box-shadow: 0 1px 2px rgba(0,0,0,0.4), 0 1px 12px rgba(0,0,0,0.45);
      }

      .flow-step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-width: 90px;
      }

      .flow-step .badge {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: #f1f5f9;
        color: #475569;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid #e2e8f0;
      }
      body.dark .flow-step .badge {
        background: #1e293b;
        color: #94a3b8;
        border-color: #334155;
      }
      .flow-step .badge svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .flow-step .label {
        font-size: 11px;
        font-weight: 500;
        color: #475569;
        text-align: center;
        max-width: 90px;
        line-height: 1.3;
      }
      body.dark .flow-step .label { color: #94a3b8; }

      .flow-step.highlight .badge {
        background: #2563eb;
        color: #ffffff;
        border-color: #2563eb;
      }
      .flow-step.highlight .label {
        color: #1d4ed8;
        font-weight: 600;
      }
      body.dark .flow-step.highlight .label { color: #60a5fa; }

      .flow-arrow {
        align-self: center;
        flex-shrink: 0;
        height: 1.5px;
        width: 18px;
        background: linear-gradient(to right, #cbd5e1, #cbd5e1);
        margin: 0 4px;
        position: relative;
      }
      .flow-arrow::after {
        content: '';
        position: absolute;
        right: -3px;
        top: -2.75px;
        width: 0;
        height: 0;
        border-left: 5px solid #cbd5e1;
        border-top: 3px solid transparent;
        border-bottom: 3px solid transparent;
      }
      body.dark .flow-arrow {
        background: #475569;
      }
      body.dark .flow-arrow::after {
        border-left-color: #475569;
      }

      .panel-row {
        display: flex;
        gap: 32px;
        flex-wrap: wrap;
        align-items: flex-start;
      }

      .legend {
        margin-top: 48px;
        font-size: 12px;
        color: #64748b;
        max-width: 720px;
      }
      body.dark .legend { color: #94a3b8; }
    </style>
  </head>
  <body id="root">
    <h2>Pipeline stages — vertical rail (matches in-app)</h2>
    <div class="rail-card" id="rail-light"></div>

    <h2>Pipeline stages — horizontal flow</h2>
    <div class="flow" id="flow-light"></div>

    <h2>Dark variant</h2>
    <div class="panel-row">
      <div style="background:#060912;padding:36px;border-radius:18px;">
        <div class="rail-card dark-card" id="rail-dark"></div>
      </div>
      <div style="background:#060912;padding:36px;border-radius:18px;">
        <div class="flow dark-card" id="flow-dark"></div>
      </div>
    </div>

    <script>
      // Inline lucide icon SVG paths (simplified)
      const ICONS = {
        Search:        '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
        BarChart3:     '<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
        Brain:         '<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>',
        Key:           '<circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/>',
        Scale:         '<path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/>',
        ClipboardList: '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
        FileCheck:     '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/>',
        UserCheck:     '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/>',
        Clock:         '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
        MessageSquare: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
      };

      const STAGES = [
        { id: 'search',         label: 'Search',           icon: 'Search',        status: 'completed' },
        { id: 'score',          label: 'Match Scores',     icon: 'BarChart3',     status: 'completed' },
        { id: 'agent_resolve',  label: 'AI Resolution',    icon: 'Brain',         status: 'completed' },
        { id: 'decode',         label: 'Decoded Data',     icon: 'Key',           status: 'completed' },
        { id: 'rules',          label: 'Compliance Rules', icon: 'Scale',         status: 'completed' },
        { id: 'disposition',    label: 'Disposition',      icon: 'ClipboardList', status: 'completed', active: true },
        { id: 'report',         label: 'Report',           icon: 'FileCheck',     status: 'completed' },
        { id: 'review',         label: 'Review',           icon: 'UserCheck',     status: 'completed' },
        { id: 'audit',          label: 'Audit Trail',      icon: 'Clock',         status: 'always' },
        { id: 'replies',        label: 'Consumer Replies', icon: 'MessageSquare', status: 'always' },
      ];

      function svgIcon(name) {
        return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${ICONS[name] || ''}</svg>`;
      }

      function renderRail(host) {
        host.innerHTML = `<div class="rail-title">Stages</div>` + STAGES.map(s => {
          const isActive = s.active;
          const dotClass = isActive ? 'active-dot' : (s.status === 'always' ? 'always' : 'completed');
          return `<div class="stage-row${isActive ? ' active' : ''}">
            <span class="stage-dot ${dotClass}"></span>
            <span class="stage-icon">${svgIcon(s.icon)}</span>
            <span>${s.label}</span>
          </div>`;
        }).join('');
      }

      function renderFlow(host) {
        const parts = [];
        STAGES.forEach((s, i) => {
          parts.push(`<div class="flow-step${s.active ? ' highlight' : ''}">
            <span class="badge">${svgIcon(s.icon)}</span>
            <span class="label">${s.label}</span>
          </div>`);
          if (i < STAGES.length - 1) parts.push('<div class="flow-arrow"></div>');
        });
        host.innerHTML = parts.join('');
      }

      renderRail(document.getElementById('rail-light'));
      renderRail(document.getElementById('rail-dark'));
      renderFlow(document.getElementById('flow-light'));
      renderFlow(document.getElementById('flow-dark'));

      // Apply dark class on the dark variants by giving them a dark wrapper
      ['rail-dark', 'flow-dark'].forEach(id => {
        const el = document.getElementById(id);
        // Wrap in a dark scope by toggling a class on a wrapper
        const wrap = document.createElement('div');
        wrap.className = 'dark-scope';
        wrap.style.color = '#e2e8f0';
        // Simulate body.dark: replicate the cascade by setting the necessary props
      });
      // Simplest: just toggle body.dark for the dark variants by inlining override styles
      const darkOverride = document.createElement('style');
      darkOverride.textContent = `
        #rail-dark { background: #0f1626; }
        #rail-dark .stage-row { color: #94a3b8; }
        #rail-dark .stage-row.active { color: #fff; }
        #rail-dark .rail-title { color: #94a3b8; }
        #flow-dark { background: #0f1626; }
        #flow-dark .badge { background: #1e293b; color: #94a3b8; border-color: #334155; }
        #flow-dark .flow-step.highlight .badge { background: #2563eb; color: #fff; border-color: #2563eb; }
        #flow-dark .label { color: #94a3b8; }
        #flow-dark .flow-step.highlight .label { color: #60a5fa; }
        #flow-dark .flow-arrow { background: #475569; }
        #flow-dark .flow-arrow::after { border-left-color: #475569; }
      `;
      document.head.appendChild(darkOverride);
    </script>
  </body>
</html>
